body {

}

.card {

  max-width: 600px;
  box-sizing: border-box;
}

label {

}

button:hover:not(:disabled) {

button:disabled {

  color: #444;

}

#stats {
  margin-top: 20px;
  font-size: 18px;
  line-height: 1.8;
}

.stat-row {
  display: flex;
  justify-content: space-between;

  padding: 4px 0;

}

.stat-val {

.gear-bullet {

  flex-shrink: 0;

hr {

  margin: 20px 0;
}

h2 {
  margin-top: 0;
}

const skillLevels = {};
const customEntries = {};

function rollDice() {
  return Math.floor(Math.random() * 6) + 1;
}

function stat() {
  return rollDice() + rollDice() + 4;
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function pickUnique(arr, count) {
  return [...arr].sort(() => Math.random() - 0.5).slice(0, count);
}

function levelCost(level) {
  return (level * (level + 1)) / 2;
}

function getSpent() {
  return Object.values(skillLevels).reduce((sum, lvl) => sum + levelCost(lvl), 0);
}

function updatePointsDisplay() {
  const remaining = SKILL_POINTS_TOTAL - getSpent();
  const el = document.getElementById("pts-remaining");
  el.textContent = remaining;
  el.style.color = remaining < 0 ? "#e07070" : "#ffd700";
}

function changeLevel(key, delta) {
  const current = skillLevels[key] || 0;
  const next = current + delta;
  if (next < 0) return;
  const wouldSpend = getSpent() - levelCost(current) + levelCost(next);
  if (wouldSpend > SKILL_POINTS_TOTAL) return;
  skillLevels[key] = next;
  renderSkills();
}

function addCustomSkill(key) {
  const input = document.getElementById("custom-input-" + key);
  const val = input.value.trim();
  if (!val) return;
  if (!customEntries[key]) customEntries[key] = [];
  customEntries[key].push(val);
  input.value = "";
  renderSkills();
}

function removeCustomSkill(key, index) {
  customEntries[key].splice(index, 1);
  renderSkills();
}

function renderSkills() {
  const container = document.getElementById("skills-container");
  const byGroup = {};

    if (!byGroup[g.stat]) byGroup[g.stat] = [];
    byGroup[g.stat].push(g);

      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">`;

    groups.forEach(g => {
      const key = g.name;
      const level = skillLevels[key] || 0;
      const cost = levelCost(level);
      const customSkills = g.custom ? (customEntries[key] || []) : [];

        ? allSkills.map((s, i) => {
            if (i >= g.skills.length) {

            }
            return `<span>${s}</span>`;
          }).join('<span style="color:#444"> · </span>')
        : `<span style="color:#444;font-style:italic;">brak umiejętności</span>`;

      const customInputHtml = g.custom ? `
        <div style="display:flex;gap:4px;margin-top:6px;">
          <input id="custom-input-${key}" placeholder="Dodaj umiejętność..."
            style="flex:1;font-size:11px;padding:3px 6px;background:#1a1a1a;color:#ccc;border:1px solid #444;border-radius:4px;font-family:serif;">
          <button onclick="addCustomSkill('${key}')"
            style="padding:2px 8px;font-size:13px;background:#444;border:none;border-radius:4px;color:white;cursor:pointer;">+</button>
        </div>` : "";

      html += `<div style="background:#2a2a2a;border-radius:6px;padding:8px;border:1px solid #333;">
        <div style="font-size:13px;font-weight:bold;margin-bottom:4px;color:#ddd;">${key}</div>
        <div style="font-size:11px;color:#666;margin-bottom:4px;line-height:1.6;">${skillsHtml}</div>
        ${customInputHtml}
        <div style="display:flex;align-items:center;gap:6px;margin-top:6px;">
          <button onclick="changeLevel('${key}',-1)"
            style="width:24px;height:24px;padding:0;font-size:16px;line-height:1;background:#333;border:none;border-radius:4px;color:white;cursor:pointer;">−</button>
          <span style="min-width:20px;text-align:center;color:#ffd700;font-size:16px;font-weight:bold;">${level}</span>
          <button onclick="changeLevel('${key}',1)"
            style="width:24px;height:24px;padding:0;font-size:16px;line-height:1;background:#333;border:none;border-radius:4px;color:white;cursor:pointer;">+</button>
          <span style="font-size:11px;color:#555;margin-left:2px;">${level > 0 ? `wydane: ${cost} pkt` : ""}</span>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  }

  container.innerHTML = html;
  updatePointsDisplay();
}

function generateName() {
  const noun = second[Math.floor(Math.random() * second.length)];
  let name;
  if (noun.gender === "phrase") {
    // frazy już mają wbudowany przymiotnik, nie doklejamy drugiego
    name = noun.word;
  } else {
    const adjectiveList = firstByGender[noun.gender];
    const adj = adjectiveList[Math.floor(Math.random() * adjectiveList.length)];
    name = adj + " " + noun.word;
  }
  document.getElementById("nickname-wrapper").style.display = "block";
  document.getElementById("nickname").value = name;
}

function rollStats() {
  document.getElementById("stats").innerHTML = statNames.map(name =>
    `<div class="stat-row"><span>${name}</span><span class="stat-val">${stat()}</span></div>`
  ).join("");
  rollTimestamp = Date.now();
  startCooldown(rollTimestamp);
}

function startCooldown(since) {
  const btn = document.getElementById("rollBtn");
  const msg = document.getElementById("cooldown-msg");
  btn.disabled = true;
  msg.style.display = "block";
  if (cooldownInterval) clearInterval(cooldownInterval);
  cooldownInterval = setInterval(() => {
    const remaining = COOLDOWN_MS - (Date.now() - since);
    if (remaining <= 0) {
      clearInterval(cooldownInterval);
      btn.disabled = false;
      msg.style.display = "none";
      rollTimestamp = null;
    } else {
      const m = Math.floor(remaining / 60000);
      const s = Math.floor((remaining % 60000) / 1000);
      msg.textContent = `Kości ostygną za: ${m}:${s.toString().padStart(2, "0")}`;
    }
  }, 500);
}

function resetCooldown() {
  rollTimestamp = null;
  if (cooldownInterval) clearInterval(cooldownInterval);
  document.getElementById("rollBtn").disabled = false;
  document.getElementById("cooldown-msg").style.display = "none";
}

function rollFlaw() {
  document.getElementById("flaw-input").value = pickRandom(flaws);
  document.getElementById("flaw").style.display = "block";
}

function rollLuck() {
  const luck = Math.floor(Math.random() * 7);
  const fame = Math.floor(Math.random() * 7);
  const reputation = Math.floor(Math.random() * 41) - 20;

  const repColor = reputation > 5 ? "#7ec87e" : reputation < -5 ? "#e07070" : "#aaa";

  const repLabel = reputation >= 18 ? "— Gildia rozważa pomnik za życia"
    : reputation >= 14 ? "— Święty patron złodziei"
    : reputation >= 10 ? "— Słowo honoru coś znaczy"
    : reputation >= 6  ? "— Umowy dotrzymuje. Zazwyczaj."
    : reputation >= 2  ? "— Można mu zaufać w drobnych sprawach"
    : reputation >= -1 ? "— Wszystko zależy od kwoty"
    : reputation >= -5 ? "— Zależy co rozumiesz przez 'uczciwy'"
    : reputation >= -9 ? "— Nie odwracaj się plecami"
    : reputation >= -13? "— Własna matka liczy srebrne łyżki"
    : reputation >= -17? "— Nawet złodzieje zamykają przed nim drzwi"
    : "— Legenda hańby. Cytowany jako przestroga.";

  const fameLabel = fame === 0 ? "— Nie istnieje w żadnym rejestrze"
    : fame === 1 ? "— Kto taki?"
    : fame === 2 ? "— Ta twarz skądś znajoma"
    : fame === 3 ? "— Znany w kręgach"
    : fame === 4 ? "— Szepczą o nim po tawernach"
    : fame === 5 ? "— Opiewany w balladach"
    : "— Chodząca legenda";

  const luckLabel = luck === 0 ? "— Wszechświat nie jest świadomy jego istnienia"
    : luck === 1 ? "— Coś mu wychodzi raz na jakiś czas"
    : luck === 2 ? "— Nieprzypadkowo wciąż żyje"
    : luck === 3 ? "— Monety lądują właściwą stroną"
    : luck === 4 ? "— Bez szwanku od urodzenia"
    : luck === 5 ? "— Podobno ma 7 żyć"
    : "— To szczęście jest cięższe niż prawa fizyki";

  document.getElementById("luck").style.display = "block";
  document.getElementById("luck").innerHTML = `
    <div class="stat-row">
      <span>Szczęście <span style="color:#555;font-size:12px;">${luckLabel}</span></span>
      <span class="stat-val" style="${luck === 0 ? "color:#e07070;" : ""}">${luck}<span style="color:#555;font-size:13px;">/6</span></span>
    </div>
    <div class="stat-row">
      <span>Sława <span style="color:#555;font-size:12px;">${fameLabel}</span></span>
      <span class="stat-val" style="${fame === 0 ? "color:#e07070;" : ""}">${fame}<span style="color:#555;font-size:13px;">/6</span></span>
    </div>
    <div class="stat-row">
      <span>Reputacja <span style="color:#555;font-size:12px;">${repLabel}</span></span>
      <span class="stat-val" style="color:${repColor};">${reputation > 0 ? "+" : ""}${reputation}<span style="color:#555;font-size:13px;">/20</span></span>
    </div>
  `;
}

function rollGear() {
  const html = pickUnique(gearPool, 3).map(item =>
    `<div class="gear-item"><span class="gear-bullet">◆</span><span>${item}</span></div>`
  ).join("");
  document.getElementById("gear").style.display = "block";
  document.getElementById("gear").innerHTML = html;
}

function rollWeapon() {
  const weapon = pickRandom(weaponPool);
  const inscription = pickRandom(inscriptions);
  document.getElementById("weapon").style.display = "block";
  document.getElementById("weapon").innerHTML = `
    <div class="gear-item"><span class="gear-bullet">⚔</span><span>${weapon}</span></div>
    <div class="gear-item" style="color:#888;font-size:13px;"><span class="gear-bullet" style="color:#555;">✦</span><span>Inskrypcja: <em>${inscription}</em></span></div>
  `;
}

function submitCard() {
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDCt14FwTzvpqabeZQbjfVTQMNYdPCFllW6dQRgJ_tXIa4g1xFzGw7XhZ5mcT6kLIw/exec";

  const statEls = document.querySelectorAll("#stats .stat-val");
  const statValues = [...statEls].map(el => parseInt(el.textContent));

  const luckEls = document.querySelectorAll("#luck .stat-val");
  const luckValues = [...luckEls].map(el => el.textContent.replace("/6","").replace("/20","").trim());

  const skillLines = skillGroups
    .map(g => { const lvl = skillLevels[g.name] || 0; return lvl > 0 ? `${g.name}:${lvl}` : null; })
    .filter(Boolean).join(", ") || "brak";

  const params = new URLSearchParams({
    realname:      document.getElementById("realname").value.trim() || "—",
    nickname:      document.getElementById("nickname").value.trim() || "—",
    luck:          luckValues[0] || "—",
    fame:          luckValues[1] || "—",
    reputation:    luckValues[2] || "—",
    stat_cialo:    statValues[0] || "—",
    stat_zdolnosc: statValues[1] || "—",
    stat_psycha:   statValues[2] || "—",
    stat_rozum:    statValues[3] || "—",
    stat_zmysl:    statValues[4] || "—",
    skills:        skillLines,
    flaw:          document.getElementById("flaw-input").value.trim() || "—",
    gear:          document.getElementById("gear").innerText.replace(/\n+/g, " | ").trim() || "—",
    weapon:        document.getElementById("weapon").innerText.replace(/\n+/g, " | ").trim() || "—",
  });

  const btn = document.querySelector("button[onclick='submitCard()']");
  btn.disabled = true;
  btn.textContent = "Wysyłanie...";

  fetch(`${SCRIPT_URL}?${params.toString()}`, { method: "GET", mode: "no-cors" })
    .then(() => {
      btn.textContent = "✓ Wysłano do Mistrza Kluczy";
      btn.style.background = "#2d6a2d";
    })
    .catch(() => {
      btn.disabled = false;
      btn.textContent = "✉ Wyślij Kartę Postaci do Mistrza Kluczy";
      alert("Coś poszło nie tak. Spróbuj ponownie.");
    });
}

function randomizeSkills() {
  skillGroups.forEach(g => { skillLevels[g.name] = 0; });
  let remaining = SKILL_POINTS_TOTAL;
  const keys = skillGroups.map(g => g.name);
  while (remaining > 0) {
    const key = keys[Math.floor(Math.random() * keys.length)];
    const current = skillLevels[key] || 0;
    const nextCost = current + 1;
    if (nextCost <= remaining) {
      skillLevels[key] = current + 1;
      remaining -= nextCost;
    } else {
      const affordable = keys.filter(k => (skillLevels[k] || 0) + 1 <= remaining);
      if (affordable.length === 0) break;
      const pick = affordable[Math.floor(Math.random() * affordable.length)];
      const lvl = skillLevels[pick] || 0;
      skillLevels[pick] = lvl + 1;
      remaining -= (lvl + 1);
    }
  }
  renderSkills();
}

function resetSkills() {
  skillGroups.forEach(g => { skillLevels[g.name] = 0; });
  renderSkills();
}

renderSkills();
